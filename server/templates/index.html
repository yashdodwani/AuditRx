<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuditRx — Clinical Trial Deviation Triage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f0e;
    --bg2:       #141714;
    --bg3:       #1a1e1a;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --text:      #e8ede8;
    --muted:     #7a8a7a;
    --accent:    #4ade80;
    --accent2:   #86efac;
    --warn:      #fbbf24;
    --danger:    #f87171;
    --info:      #60a5fa;
    --critical:  #f87171;
    --major:     #fbbf24;
    --minor:     #4ade80;
    --mono:      'DM Mono', monospace;
    --serif:     'Fraunces', serif;
    --sans:      'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text); font-weight: 300; font-style: italic; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); display: inline-block;
    margin-right: 6px; transition: background 0.3s;
  }
  .status-dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-label { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* ── Layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr 300px;
    grid-template-rows: 1fr;
    height: calc(100vh - 61px);
    overflow: hidden;
  }

  /* ── Panels ── */
  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .panel:last-child { border-right: none; }

  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Task selector ── */
  .task-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    color: var(--text);
    text-align: left;
    transition: border-color 0.2s, background 0.2s;
    font-family: var(--sans);
  }
  .task-btn:hover { border-color: var(--border2); background: #1f241f; }
  .task-btn.active { border-color: var(--accent); background: rgba(74,222,128,0.06); }
  .task-btn .t-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .task-btn .t-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .difficulty {
    display: inline-block; font-family: var(--mono);
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    margin-top: 6px;
  }
  .diff-easy   { background: rgba(74,222,128,0.12);  color: var(--accent); }
  .diff-medium { background: rgba(251,191,36,0.12);  color: var(--warn); }
  .diff-hard   { background: rgba(248,113,113,0.12); color: var(--danger); }

  /* ── Start / Reset button ── */
  .btn-primary {
    background: var(--accent);
    color: #0d1a0d;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Case card ── */
  .case-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .case-meta {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 16px;
  }
  .meta-item .label {
    font-family: var(--mono); font-size: 10px;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 3px;
  }
  .meta-item .value { font-size: 13px; font-weight: 500; }

  .case-description {
    font-size: 13px; line-height: 1.7; color: var(--text);
    border-top: 1px solid var(--border); padding-top: 14px;
  }

  .evidence-box {
    background: rgba(96,165,250,0.06);
    border: 1px solid rgba(96,165,250,0.2);
    border-radius: 6px; padding: 12px;
    font-size: 12px; color: var(--info); line-height: 1.6;
    margin-top: 12px;
  }

  /* ── Severity badge ── */
  .severity-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px;
    padding: 3px 10px; border-radius: 4px;
  }
  .sev-critical { background: rgba(248,113,113,0.12); color: var(--critical); }
  .sev-major    { background: rgba(251,191,36,0.12);  color: var(--major); }
  .sev-minor    { background: rgba(74,222,128,0.12);  color: var(--minor); }

  /* ── Action forms ── */
  .action-section { display: flex; flex-direction: column; gap: 14px; }

  label.field-label {
    display: block; font-family: var(--mono); font-size: 10px;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 6px;
  }

  select, textarea, input[type="number"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus, textarea:focus, input[type="number"]:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── Chat (negotiate task) ── */
  .chat-log {
    display: flex; flex-direction: column; gap: 12px;
    max-height: 340px; overflow-y: auto;
    padding: 4px 0;
  }
  .chat-msg {
    padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; max-width: 90%;
  }
  .chat-msg.agent {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.2);
    align-self: flex-end;
    color: var(--accent2);
  }
  .chat-msg.coordinator {
    background: var(--bg3);
    border: 1px solid var(--border);
    align-self: flex-start;
    color: var(--text);
  }
  .chat-role {
    font-family: var(--mono); font-size: 10px;
    color: var(--muted); margin-bottom: 4px;
  }

  /* ── Episode log (right panel) ── */
  .log-entry {
    padding: 10px 12px;
    border-radius: 6px;
    background: var(--bg2);
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
  }
  .log-entry .log-step { color: var(--muted); }
  .log-entry .log-reward { color: var(--accent); font-weight: 500; }
  .log-entry .log-action { color: var(--info); }
  .log-entry .log-feedback { color: var(--text); opacity: 0.8; margin-top: 4px; font-size: 10px; }

  /* ── Score display ── */
  .score-ring {
    text-align: center; padding: 20px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .score-big {
    font-family: var(--serif); font-size: 56px;
    font-weight: 600; line-height: 1;
    transition: color 0.4s;
  }
  .score-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }

  .reward-bar-wrap {
    background: var(--bg3); border-radius: 4px;
    overflow: hidden; height: 6px; margin-top: 8px;
  }
  .reward-bar {
    height: 100%; background: var(--accent);
    transition: width 0.4s ease, background 0.4s;
    border-radius: 4px;
  }

  /* ── Empty states ── */
  .empty {
    color: var(--muted); font-size: 12px; text-align: center;
    padding: 32px 16px; line-height: 1.7;
  }
  .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

  /* ── Done banner ── */
  .done-banner {
    padding: 14px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    text-align: center; display: none;
  }
  .done-banner.success {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    color: var(--accent);
    display: block;
  }
  .done-banner.fail {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--danger);
    display: block;
  }

  /* ── Escalation buttons ── */
  .esc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .esc-btn {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 8px;
    color: var(--text); cursor: pointer; font-family: var(--sans);
    font-size: 11px; text-align: center; transition: all 0.2s;
  }
  .esc-btn:hover { border-color: var(--border2); }
  .esc-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(74,222,128,0.06); }
  .esc-btn[data-val="halt_site"]:hover { border-color: var(--danger); color: var(--danger); }
  .esc-btn[data-val="irb_report"]:hover { border-color: var(--warn); color: var(--warn); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── Loading spinner ── */
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">Audit<span>Rx</span></div>
  <div>
    <span class="status-dot" id="dot"></span>
    <span class="status-label" id="status-label">disconnected</span>
  </div>
</header>

<main>

  <!-- ── LEFT: Task + Controls ── -->
  <div class="panel" id="left-panel">
    <div class="panel-title">Select Task</div>

    <button class="task-btn active" data-task="classify_deviation" onclick="selectTask(this)">
      <div class="t-name">Classify Deviation</div>
      <div class="t-desc">Identify severity and category of a protocol deviation</div>
      <span class="difficulty diff-easy">easy</span>
    </button>

    <button class="task-btn" data-task="draft_capa" onclick="selectTask(this)">
      <div class="t-name">Draft CAPA</div>
      <div class="t-desc">Write root cause analysis and corrective actions</div>
      <span class="difficulty diff-medium">medium</span>
    </button>

    <button class="task-btn" data-task="negotiate_escalation" onclick="selectTask(this)">
      <div class="t-name">Negotiate Escalation</div>
      <div class="t-desc">Multi-turn adversarial negotiation with site coordinator</div>
      <span class="difficulty diff-hard">hard</span>
    </button>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
      <button class="btn-primary" id="start-btn" onclick="startEpisode()">Start Episode</button>
      <div style="text-align:center; font-family: var(--mono); font-size: 10px; color: var(--muted);" id="session-info"></div>
    </div>
  </div>

  <!-- ── MIDDLE: Case + Action ── -->
  <div class="panel" id="middle-panel">
    <div class="panel-title">Case File</div>

    <!-- Empty state -->
    <div class="empty" id="empty-state">
      <div class="empty-icon">⚕</div>
      Select a task and click<br><strong style="color:var(--text)">Start Episode</strong><br>to load a deviation case.
    </div>

    <!-- Case card (hidden until loaded) -->
    <div class="hidden" id="case-section">
      <div class="case-card" id="case-card">
        <div class="case-meta" id="case-meta"></div>
        <div class="case-description" id="case-desc"></div>
        <div class="evidence-box hidden" id="evidence-box"></div>
      </div>

      <!-- Coordinator chat (task 3 only) -->
      <div class="hidden" id="chat-section" style="margin-top:16px">
        <div class="panel-title" style="margin-bottom:12px">Coordinator Exchange</div>
        <div class="chat-log" id="chat-log"></div>
      </div>

      <!-- Action forms -->
      <div style="margin-top: 20px;" id="action-area">

        <!-- Task 1: Classify -->
        <div id="form-classify" class="action-section">
          <div class="panel-title" style="margin-bottom:4px">Your Classification</div>
          <div class="action-row">
            <div>
              <label class="field-label">Severity</label>
              <select id="sel-severity">
                <option value="">-- select --</option>
                <option value="critical">Critical</option>
                <option value="major">Major</option>
                <option value="minor">Minor</option>
              </select>
            </div>
            <div>
              <label class="field-label">Category</label>
              <select id="sel-category">
                <option value="">-- select --</option>
                <option value="informed_consent">Informed Consent</option>
                <option value="eligibility_criteria">Eligibility Criteria</option>
                <option value="dosing_error">Dosing Error</option>
                <option value="visit_window">Visit Window</option>
                <option value="data_integrity">Data Integrity</option>
                <option value="safety_reporting">Safety Reporting</option>
                <option value="randomization">Randomization</option>
              </select>
            </div>
          </div>
          <button class="btn-primary" onclick="submitClassify()">Submit Classification</button>
        </div>

        <!-- Task 2: CAPA -->
        <div id="form-capa" class="action-section hidden">
          <div class="panel-title" style="margin-bottom:4px">CAPA Response</div>
          <div>
            <label class="field-label">Root Cause</label>
            <textarea id="ta-root" placeholder="What was the fundamental cause of this deviation?" rows="3"></textarea>
          </div>
          <div>
            <label class="field-label">Corrective Action</label>
            <textarea id="ta-corrective" placeholder="Immediate steps to address this deviation..." rows="3"></textarea>
          </div>
          <div>
            <label class="field-label">Preventive Action</label>
            <textarea id="ta-preventive" placeholder="Systemic changes to prevent recurrence..." rows="3"></textarea>
          </div>
          <div>
            <label class="field-label">Timeline (days)</label>
            <input type="number" id="inp-timeline" min="1" max="180" placeholder="e.g. 14" style="max-width:120px">
          </div>
          <button class="btn-primary" onclick="submitCapa()">Submit CAPA</button>
        </div>

        <!-- Task 3: Negotiate -->
        <div id="form-negotiate" class="action-section hidden">
          <div class="panel-title" style="margin-bottom:4px">Your Response</div>
          <div>
            <label class="field-label">Message to Coordinator</label>
            <textarea id="ta-message" placeholder="Respond professionally, cite specific regulations (ICH-GCP, 21 CFR)..." rows="4"></textarea>
          </div>
          <div>
            <label class="field-label">Escalation Decision (optional — finalizes episode)</label>
            <div class="esc-grid" id="esc-grid">
              <button class="esc-btn" data-val="self_correct"   onclick="selectEsc(this)">Self-Correct</button>
              <button class="esc-btn" data-val="sponsor_notify" onclick="selectEsc(this)">Sponsor Notify</button>
              <button class="esc-btn" data-val="irb_report"     onclick="selectEsc(this)">IRB Report</button>
              <button class="esc-btn" data-val="halt_site"      onclick="selectEsc(this)">Halt Site</button>
            </div>
          </div>
          <button class="btn-primary" onclick="submitNegotiate()">Send Message</button>
        </div>

      </div>

      <div class="done-banner hidden" id="done-banner"></div>
    </div>
  </div>

  <!-- ── RIGHT: Episode Log + Score ── -->
  <div class="panel" id="right-panel">
    <div class="panel-title">Episode Log</div>

    <div class="score-ring">
      <div class="score-big" id="score-display" style="color:var(--muted)">—</div>
      <div class="score-label">cumulative reward</div>
      <div class="reward-bar-wrap" style="margin-top:12px">
        <div class="reward-bar" id="reward-bar" style="width:0%"></div>
      </div>
    </div>

    <div id="log-empty" class="empty" style="padding:16px 0">
      <div style="color:var(--muted); font-size:12px">Steps will appear here</div>
    </div>

    <div id="log-entries" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>

</main>

<script>
const BASE = window.location.origin;
let sessionId = null;
let currentTask = 'classify_deviation';
let selectedEscalation = null;
let stepCount = 0;
let totalReward = 0;

function selectTask(btn) {
  document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTask = btn.dataset.task;
}

function selectEsc(btn) {
  document.querySelectorAll('.esc-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEscalation = btn.dataset.val;
}

function setStatus(connected) {
  const dot = document.getElementById('dot');
  const lbl = document.getElementById('status-label');
  dot.className = 'status-dot' + (connected ? ' live' : '');
  lbl.textContent = connected ? 'connected' : 'idle';
}

function setLoading(loading) {
  const btn = document.getElementById('start-btn');
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' : 'New Episode';
}

async function startEpisode() {
  setLoading(true);
  stepCount = 0; totalReward = 0; selectedEscalation = null;

  // Reset UI
  document.getElementById('log-entries').innerHTML = '';
  document.getElementById('log-empty').style.display = 'block';
  document.getElementById('chat-log').innerHTML = '';
  document.getElementById('done-banner').className = 'done-banner hidden';
  document.getElementById('score-display').textContent = '—';
  document.getElementById('score-display').style.color = 'var(--muted)';
  document.getElementById('reward-bar').style.width = '0%';
  document.querySelectorAll('.esc-btn').forEach(b => b.classList.remove('selected'));

  try {
    const res = await fetch(`${BASE}/reset`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task_name: currentTask})
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    sessionId = data.session_id;
    document.getElementById('session-info').textContent = 'session: ' + sessionId.slice(0,8) + '...';
    setStatus(true);
    renderObservation(data.observation);
  } catch (e) {
    alert('Could not connect to environment: ' + e.message);
    setStatus(false);
  } finally {
    setLoading(false);
  }
}

function renderObservation(obs) {
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('case-section').classList.remove('hidden');

  // Case meta
  document.getElementById('case-meta').innerHTML = `
    <div class="meta-item"><div class="label">Case ID</div><div class="value">${obs.case_id}</div></div>
    <div class="meta-item"><div class="label">Protocol</div><div class="value">${obs.protocol_id}</div></div>
    <div class="meta-item"><div class="label">Site</div><div class="value">${obs.site_id}</div></div>
    <div class="meta-item"><div class="label">Patient</div><div class="value">${obs.patient_id}</div></div>
    <div class="meta-item"><div class="label">Event Date</div><div class="value">${obs.event_date}</div></div>
    <div class="meta-item"><div class="label">Reported By</div><div class="value" style="font-size:11px">${obs.reported_by}</div></div>
  `;
  document.getElementById('case-desc').textContent = obs.case_description;

  // Evidence
  if (obs.additional_evidence) {
    const ev = document.getElementById('evidence-box');
    ev.textContent = '⚡ ' + obs.additional_evidence;
    ev.classList.remove('hidden');
  }

  // Show correct form
  ['form-classify','form-capa','form-negotiate'].forEach(id => document.getElementById(id).classList.add('hidden'));
  const formMap = {classify_deviation:'form-classify', draft_capa:'form-capa', negotiate_escalation:'form-negotiate'};
  document.getElementById(formMap[currentTask]).classList.remove('hidden');

  // Chat section for task 3
  const chatSection = document.getElementById('chat-section');
  if (currentTask === 'negotiate_escalation') {
    chatSection.classList.remove('hidden');
    if (obs.coordinator_message) {
      addChatMsg('coordinator', 'SITE COORDINATOR', obs.coordinator_message);
    }
    if (obs.negotiation_history && obs.negotiation_history.length > 0) {
      obs.negotiation_history.forEach(h => {
        addChatMsg('agent', 'YOU', h.agent_message);
        addChatMsg('coordinator', 'SITE COORDINATOR', h.coordinator_response);
      });
    }
  } else {
    chatSection.classList.add('hidden');
  }
}

function addChatMsg(type, role, text) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + type;
  div.innerHTML = `<div class="chat-role">${role}</div>${text}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function addLogEntry(step, reward, actionStr, feedback, done) {
  const container = document.getElementById('log-entries');
  document.getElementById('log-empty').style.display = 'none';
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <div><span class="log-step">step ${step}</span> · <span class="log-reward">+${reward.toFixed(2)}</span></div>
    <div class="log-action">${actionStr}</div>
    ${feedback ? `<div class="log-feedback">${feedback}</div>` : ''}
    ${done ? `<div style="color:var(--accent);font-size:10px;margin-top:4px">✓ done</div>` : ''}
  `;
  container.prepend(div);
}

function updateScore(reward) {
  totalReward += reward;
  const pct = Math.min(totalReward / 1.0 * 100, 100);
  const score = totalReward.toFixed(2);
  const el = document.getElementById('score-display');
  el.textContent = score;
  el.style.color = totalReward >= 0.7 ? 'var(--accent)' : totalReward >= 0.4 ? 'var(--warn)' : 'var(--danger)';
  const bar = document.getElementById('reward-bar');
  bar.style.width = pct.toFixed(1) + '%';
  bar.style.background = totalReward >= 0.7 ? 'var(--accent)' : totalReward >= 0.4 ? 'var(--warn)' : 'var(--danger)';
}

function showDone(obs) {
  const banner = document.getElementById('done-banner');
  const score = obs.episode_reward_so_far || totalReward;
  const success = score >= 0.3;
  banner.className = 'done-banner ' + (success ? 'success' : 'fail');
  banner.textContent = success
    ? `Episode complete — Score: ${score.toFixed(2)} ✓`
    : `Episode complete — Score: ${score.toFixed(2)} — Try again`;

  ['form-classify','form-capa','form-negotiate'].forEach(id => {
    const f = document.getElementById(id);
    if (!f.classList.contains('hidden')) {
      f.querySelectorAll('button, select, textarea, input').forEach(el => el.disabled = true);
    }
  });
}

async function postStep(action) {
  if (!sessionId) return alert('Start an episode first.');
  stepCount++;

  const res = await fetch(`${BASE}/step`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({session_id: sessionId, action})
  });
  if (!res.ok) throw new Error(await res.text());
  return await res.json();
}

async function submitClassify() {
  const severity = document.getElementById('sel-severity').value;
  const category = document.getElementById('sel-category').value;
  if (!severity || !category) return alert('Please select both severity and category.');
  try {
    const data = await postStep({action_type:'classify', severity, category});
    const obs = data.observation;
    updateScore(data.reward);
    addLogEntry(stepCount, data.reward, `classify(${severity}, ${category})`, obs.last_action_feedback, data.done);
    if (data.done) showDone(obs);
  } catch(e) { alert(e.message); }
}

async function submitCapa() {
  const root_cause = document.getElementById('ta-root').value.trim();
  const corrective_action = document.getElementById('ta-corrective').value.trim();
  const preventive_action = document.getElementById('ta-preventive').value.trim();
  const timeline_days = parseInt(document.getElementById('inp-timeline').value);
  if (!root_cause || !corrective_action || !preventive_action || !timeline_days) {
    return alert('Please fill in all CAPA fields.');
  }
  try {
    const data = await postStep({action_type:'draft_capa', root_cause, corrective_action, preventive_action, timeline_days});
    const obs = data.observation;
    updateScore(data.reward);
    addLogEntry(stepCount, data.reward, `draft_capa(${timeline_days}d)`, obs.last_action_feedback, data.done);
    if (data.done) showDone(obs);
  } catch(e) { alert(e.message); }
}

async function submitNegotiate() {
  const message = document.getElementById('ta-message').value.trim();
  if (!message) return alert('Please enter a message.');
  const action = {
    action_type: selectedEscalation ? 'escalate' : 'negotiate',
    message,
    ...(selectedEscalation ? {escalation: selectedEscalation} : {})
  };
  try {
    const data = await postStep(action);
    const obs = data.observation;
    addChatMsg('agent', 'YOU', message);
    if (obs.coordinator_message) {
      addChatMsg('coordinator', 'SITE COORDINATOR', obs.coordinator_message);
    }
    document.getElementById('ta-message').value = '';
    updateScore(data.reward);
    const label = selectedEscalation ? `negotiate+escalate(${selectedEscalation})` : 'negotiate';
    addLogEntry(stepCount, data.reward, label, obs.last_action_feedback, data.done);
    if (data.done) showDone(obs);
    selectedEscalation = null;
    document.querySelectorAll('.esc-btn').forEach(b => b.classList.remove('selected'));
  } catch(e) { alert(e.message); }
}
</script>
</body>
</html>
